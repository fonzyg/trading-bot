<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Bot Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #c9d1d9; padding: 20px; }
  h1 { color: #58a6ff; margin-bottom: 20px; font-size: 24px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; }
  .card .label { font-size: 12px; color: #8b949e; text-transform: uppercase; margin-bottom: 4px; }
  .card .value { font-size: 28px; font-weight: 600; }
  .positive { color: #3fb950; }
  .negative { color: #f85149; }
  .neutral { color: #58a6ff; }
  .section { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; margin-bottom: 24px; }
  .section h2 { font-size: 16px; color: #58a6ff; margin-bottom: 12px; }
  canvas { width: 100%; height: 250px; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { text-align: left; padding: 8px; border-bottom: 1px solid #30363d; color: #8b949e; font-weight: 500; }
  td { padding: 8px; border-bottom: 1px solid #21262d; }
  .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
  .status-dot.active { background: #3fb950; }
  .status-dot.stopped { background: #f85149; }
  .updated { font-size: 12px; color: #8b949e; margin-top: 8px; }
  .buy-tag { background: #1f6feb33; color: #58a6ff; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
  .sell-tag { background: #f8514933; color: #f85149; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
</style>
</head>
<body>
<h1>Trading Bot Dashboard</h1>

<div class="grid">
  <div class="card">
    <div class="label">Status</div>
    <div class="value" id="status"><span class="status-dot active"></span>Loading</div>
  </div>
  <div class="card">
    <div class="label">Symbol</div>
    <div class="value neutral" id="symbol">--</div>
  </div>
  <div class="card">
    <div class="label">Current Price</div>
    <div class="value" id="price">--</div>
  </div>
  <div class="card">
    <div class="label">Equity</div>
    <div class="value" id="equity">--</div>
  </div>
  <div class="card">
    <div class="label">Cash</div>
    <div class="value" id="cash">--</div>
  </div>
  <div class="card">
    <div class="label">Position</div>
    <div class="value neutral" id="position">--</div>
  </div>
  <div class="card">
    <div class="label">Realized PnL</div>
    <div class="value" id="pnl">--</div>
  </div>
  <div class="card">
    <div class="label">Win Rate</div>
    <div class="value" id="winrate">--</div>
  </div>
</div>

<div class="section">
  <h2>Equity Curve</h2>
  <canvas id="chart"></canvas>
</div>

<div class="section">
  <h2>Trade Log</h2>
  <table>
    <thead>
      <tr><th>Time</th><th>Side</th><th>Qty</th><th>Price</th><th>Reason</th><th>PnL</th></tr>
    </thead>
    <tbody id="trades"></tbody>
  </table>
</div>

<div class="updated" id="updated"></div>

<script>
function $(id) { return document.getElementById(id); }

function pnlClass(val) {
  if (val > 0) return 'positive';
  if (val < 0) return 'negative';
  return '';
}

function drawChart(ticks) {
  const canvas = $('chart');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  const w = rect.width;
  const h = rect.height;

  if (!ticks || ticks.length < 2) {
    ctx.fillStyle = '#8b949e';
    ctx.font = '14px sans-serif';
    ctx.fillText('Waiting for data...', w / 2 - 60, h / 2);
    return;
  }

  const equities = ticks.map(t => t.equity);
  const min = Math.min(...equities) * 0.999;
  const max = Math.max(...equities) * 1.001;
  const range = max - min || 1;

  ctx.clearRect(0, 0, w, h);

  // Grid
  ctx.strokeStyle = '#21262d';
  ctx.lineWidth = 1;
  for (let i = 0; i < 5; i++) {
    const y = (h / 4) * i;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
  }

  // Line
  ctx.strokeStyle = '#58a6ff';
  ctx.lineWidth = 2;
  ctx.beginPath();
  for (let i = 0; i < equities.length; i++) {
    const x = (i / (equities.length - 1)) * w;
    const y = h - ((equities[i] - min) / range) * h;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.stroke();

  // Fill
  const lastX = w;
  const lastY = h - ((equities[equities.length - 1] - min) / range) * h;
  ctx.lineTo(lastX, h);
  ctx.lineTo(0, h);
  ctx.closePath();
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, 'rgba(88,166,255,0.15)');
  grad.addColorStop(1, 'rgba(88,166,255,0)');
  ctx.fillStyle = grad;
  ctx.fill();

  // Labels
  ctx.fillStyle = '#8b949e';
  ctx.font = '11px sans-serif';
  ctx.fillText('$' + max.toFixed(2), 4, 14);
  ctx.fillText('$' + min.toFixed(2), 4, h - 4);
}

async function refresh() {
  try {
    const res = await fetch('/api/status');
    const d = await res.json();

    $('status').innerHTML = `<span class="status-dot active"></span>${d.mode || 'paper'}`;
    $('symbol').textContent = d.symbol || '--';
    $('price').textContent = d.lastPrice ? '$' + d.lastPrice.toFixed(2) : '--';
    $('equity').textContent = d.equity ? '$' + d.equity.toFixed(2) : '--';
    $('equity').className = 'value ' + pnlClass(d.equity - 1000);
    $('cash').textContent = d.cash ? '$' + d.cash.toFixed(2) : '--';
    $('position').textContent = d.position || '0';
    $('pnl').textContent = '$' + (d.totalPnL || '0.00');
    $('pnl').className = 'value ' + pnlClass(parseFloat(d.totalPnL));
    $('winrate').textContent = d.winRate || 'N/A';
    $('updated').textContent = d.lastUpdate ? 'Last update: ' + new Date(d.lastUpdate).toLocaleString() : '';

    drawChart(d.ticks);

    const tbody = $('trades');
    tbody.innerHTML = '';
    const trades = (d.trades || []).slice().reverse();
    for (const t of trades) {
      const tr = document.createElement('tr');
      const tag = t.side === 'buy' ? 'buy-tag' : 'sell-tag';
      tr.innerHTML = `
        <td>${t.time ? new Date(t.time).toLocaleString() : 'tick ' + t.tick}</td>
        <td><span class="${tag}">${t.side.toUpperCase()}</span></td>
        <td>${t.qty}</td>
        <td>$${t.price.toFixed(2)}</td>
        <td>${t.reason}</td>
        <td class="${pnlClass(t.pnl)}">$${(t.pnl || 0).toFixed(2)}</td>
      `;
      tbody.appendChild(tr);
    }
  } catch (err) {
    $('status').innerHTML = '<span class="status-dot stopped"></span>Disconnected';
  }
}

refresh();
setInterval(refresh, 10000);
window.addEventListener('resize', refresh);
</script>
</body>
</html>
